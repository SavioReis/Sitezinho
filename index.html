<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NÃO SEI O QUE ESCREVER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #00ff88;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .terminal {
            max-width: 750px;
            width: 100%;
            background-color: #000000;
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px #00ff88;
            padding: 2rem;
            border-radius: 10px;
        }

        .line {
            margin-bottom: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
        }

        .prompt {
            color: #00ff88;
            margin-right: 0.5rem;
            font-weight: bold;
        }

        .typed-cursor {
            display: inline-block;
            width: 0.6rem;
            height: 1.2rem;
            background-color: #00ff88;
            animation: blink 1s infinite;
            margin-left: 0.2rem;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .check-item {
            margin-left: 1.5rem;
            margin-bottom: 0.5rem;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
            font-size: 1.1rem;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .check-symbol {
            color: #00ff88;
            margin-right: 0.8rem;
            font-size: 1.3rem;
        }

        .progress-container {
            margin: 1.5rem 0 1.5rem 1.5rem;
            width: 85%;
            max-width: 400px;
            background-color: #1a1a1a;
            border: 1px solid #00ff88;
            height: 1.8rem;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #00ff88;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px #00ff88;
        }

        .button-group {
            margin: 2rem 0 1.5rem 1.5rem;
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .term-btn {
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 0.5rem 2rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .term-btn:hover {
            background-color: #00ff88;
            color: #000000;
            box-shadow: 0 0 20px #00ff88;
        }

        .mensagem-final {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #0a1a0a;
            border-left: 4px solid #00ff88;
            font-size: 1.2rem;
            line-height: 2;
            border-radius: 0 8px 8px 0;
        }

        .coracao {
            color: #ff88aa;
            font-size: 1.3rem;
        }

        .final-msg {
            margin-top: 1.5rem;
            margin-left: 1.5rem;
            font-size: 1.3rem;
            border-top: 1px dashed #00ff88;
            padding-top: 1rem;
        }

        .pequeno {
            font-size: 1rem;
            color: #88aa88;
            margin-top: 0.5rem;
        }

        @media (max-width: 500px) {
            .terminal { padding: 1rem; }
            .term-btn { font-size: 1.1rem; padding: 0.4rem 1rem; }
            .button-group { gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="terminal" id="terminal">
        <div id="output"></div>
        <span id="cursor" class="typed-cursor"></span>
    </div>

    <script>
        const output = document.getElementById('output');
        const cursor = document.getElementById('cursor');

        // Mensagens suaves e reais (dois meses de namoro)
        const bootMessages = [
            'iniciando sistema...',
            'carregando memórias dos últimos dois meses...',
            'calculando motivos pra sorrir...'
        ];

        const qualidades = [
            '✔ seu jeito de rir',
            '✔ como você me faz bem',
            '✔ sua dedicação em tudo',
            '✔ Melhor fonoaudióloga do mundo',
            '✔ o brilho no seu olhar'
        ];

        let aguardandoClique = false;

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function mostrarCursor(mostrar) {
            cursor.style.display = mostrar ? 'inline-block' : 'none';
        }

        function criarLinha() {
            const div = document.createElement('div');
            div.className = 'line';
            const prompt = document.createElement('span');
            prompt.className = 'prompt';
            prompt.textContent = '>';
            div.appendChild(prompt);
            const conteudo = document.createElement('span');
            conteudo.className = 'conteudo-linha';
            div.appendChild(conteudo);
            output.appendChild(div);
            return conteudo;
        }

        async function digitar(texto, elemento, velocidade = 40) {
            return new Promise(resolve => {
                let i = 0;
                elemento.textContent = '';
                function escrever() {
                    if (i < texto.length) {
                        elemento.textContent += texto.charAt(i);
                        i++;
                        setTimeout(escrever, velocidade);
                    } else {
                        resolve();
                    }
                }
                escrever();
            });
        }

        async function iniciar() {
            mostrarCursor(true);

            // Mensagens iniciais
            for (let msg of bootMessages) {
                const linha = criarLinha();
                await digitar(msg, linha, 45);
                await delay(200);
            }

            await delay(300);

            // Qualidades (checkmarks) - mais leve
            for (let q of qualidades) {
                const div = document.createElement('div');
                div.className = 'check-item';
                div.innerHTML = `<span class="check-symbol">✔</span> ${q.substring(2)}`;
                output.appendChild(div);
                await delay(350);
            }

            await delay(400);

            const sucesso = criarLinha();
            await digitar('tá, você é especial.', sucesso, 40);
            await delay(300);

            const analise = criarLinha();
            await digitar('processando sentimento...', analise, 40);
            await delay(400);

            // Barra de progresso
            const barraDiv = document.createElement('div');
            barraDiv.className = 'progress-container';
            barraDiv.innerHTML = '<div class="progress-fill" id="progresso"></div>';
            output.appendChild(barraDiv);
            
            const progresso = document.getElementById('progresso');
            let porcentagem = 0;
            
            while (porcentagem <= 100) {
                progresso.style.width = porcentagem + '%';
                porcentagem += 2;
                await delay(30);
            }

            await delay(200);

            const resultado = criarLinha();
            await digitar('certeza que quero você por perto: 100%', resultado, 40);
            await delay(500);

            // Pergunta simples e doce
            const pergunta = criarLinha();
            await digitar('esses dois meses foram tão bons... bora continuar?', pergunta, 45);
            await delay(400);

            // Botões com opções carinhosas
            const botoes = document.createElement('div');
            botoes.className = 'button-group';
            botoes.innerHTML = `
                <button class="term-btn" id="sim">SIM, COM VOCÊ</button>
                <button class="term-btn" id="claro">CLARO, QUERO SIM</button>
            `;
            output.appendChild(botoes);
            
            mostrarCursor(false);
            aguardandoClique = true;

            document.getElementById('sim').addEventListener('click', finalRomantico);
            document.getElementById('claro').addEventListener('click', finalRomantico);
        }

        async function finalRomantico() {
            if (!aguardandoClique) return;
            aguardandoClique = false;

            document.querySelectorAll('.term-btn').forEach(b => b.disabled = true);
            
            mostrarCursor(true);

            await delay(300);

            const msg1 = criarLinha();
            await digitar('que bom que você disse sim 💚', msg1, 45);
            await delay(200);

            const msg2 = criarLinha();
            await digitar('modo "a gente junto": ativado', msg2, 45);
            await delay(300);

            // Mensagem final - mais realista e doce
            const mensagemFinal = document.createElement('div');
            mensagemFinal.className = 'mensagem-final';
            mensagemFinal.innerHTML = `
                dois meses só,<br>
                mas já quero:<br>
                <br>
                ☾ te ver sorrir mais vezes<br>
                ☽ ouvir sobre seu dia<br>
                ☽ fazer planos simples com você<br>
                ☽ e ir descobrindo a gente aos poucos<br>
                <br>
                <span class="pequeno">sem pressa, do jeitinho que tá sendo bom</span>
            `;
            output.appendChild(mensagemFinal);
            
            await delay(600);

            const assinatura = document.createElement('div');
            assinatura.className = 'final-msg';
            assinatura.innerHTML = 'Sávio & Roberta';
            output.appendChild(assinatura);

            mostrarCursor(false);
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.addEventListener('load', iniciar);
    </script>
</body>
</html>
